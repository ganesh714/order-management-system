spring.application.name=order-service

# Server Port
server.port=8080

# Database Connection (Reads from the environment variables you will set in Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:saga_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Automatically create the database tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# External Service URLs (Defaulting to localhost for local testing)
payment.service.url=${PAYMENT_SERVICE_URL:http://localhost:8081}
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8082}